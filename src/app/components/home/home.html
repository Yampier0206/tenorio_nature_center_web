@if(!posts){
    <div class="loading">
        <p>Cargando los datos...</p>
    </div>
}@else {
    <div class="container mt-5">
        <h4>Publicaciones de usuarios</h4>
        <div class="row d-flex">
            <span>
                <div class="col">
                  @for(post of posts; track $index){
                    <div class="card mb-4" style="width: 18rem;">
                        <!--Agregar un img del post-->
                        <div class="card-body">
                            <h5 class="card-title">{{post.title}}</h5>
                            <p>Creado: {{post.created_at}}</p>
                            <a class="btn btn-primary" [routerLink]="['/detalle/'+post.id]">Ver</a>
                            @if(isOwner(post)){
                            <a class="btn btn-warning ms-2" [routerLink]="['/editar/'+post.id]">Editar</a>
                            <button class="btn btn-danger ms-2">Eliminar</button>
                            }

                        </div>
                    </div>
                  }  
                </div>
            </span>
        </div>
    </div>
}
