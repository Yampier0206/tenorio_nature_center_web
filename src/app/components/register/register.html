<div class="col-md-12 mt-4">
    <h3 class="text-center">Registro de usuario</h3>
    <form class="col-md-8 mx-auto" #registerForm="ngForm" (ngSubmit)="onSubmit(registerForm)">
        <div class="form-group">
            <label for="name">Nombre</label>
            <input type="text" class="form-control" name="name" #name="ngModel" 
                [(ngModel)]="user.name" required pattern="^(?=.*[a-z])(?=.*[A-Z]).{3,}$">
            @if(!name.valid&&name.touched){
                <small class="invalid-feedback d-block">Formato inválido!</small>
            }  
        </div>
        <div class="form-group">
            <label for="last_name">Apellidos</label>
            <input type="text" class="form-control" name="last_name" #last_name="ngModel"
                [(ngModel)]="user.last_name" required>
        </div>
        <div class="form-group">
            <label for="image">Imagen</label>
            <input type="file" class="form-control" name="image" 
                #fileUpload (change)="uploadImage($event)" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" name="email" #email="ngModel"
                [(ngModel)]="user.email" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" class="form-control" name="password" #password="ngModel"
                [(ngModel)]="user.password" required>
        </div>
        <input type="submit" value="Registrarse" [disabled]="registerForm.invalid"
            class="btn btn-primary mt-2">
    </form>

</div>
